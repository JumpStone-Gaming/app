name: Modrinth App release
on:
  workflow_run:
    workflows: ['Modrinth App build']
    types: [completed]

jobs:
  release:
    name: Release JS Gaming App
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: theseus-build.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: App bundle (x86_64-pc-windows-msvc)
          path: windows-build

      - name: 🛠️ Generate latest.json (Tauri Updater)
        run: |
          VERSION_TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION_TAG#v}"

          # Signatur aus der generierten .sig Datei auslesen
          # Hinweis: Der Dateiname muss exakt so sein, wie Tauri ihn im Build erstellt!
          SIG=$(cat windows-build/*.zip.sig)

          jq -nc \
            --arg ver "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/JS_Gaming_App_${VERSION}_x64-setup.nsis.zip" \
            '{
              "version": $ver,
              "notes": "JumpStone Launcher Update",
              "pub_date": now | todateiso8601,
              "platforms": {
                "windows-x86_64": {
                  "signature": $sig,
                  "url": $url
                }
              }
            }' > latest.json

      - name: 🏷️ Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_TAG="${{ github.event.workflow_run.head_branch }}"

          gh release create "$VERSION_TAG" \
            --title "JS Gaming App $VERSION_TAG" \
            --notes "Automatischer Release von JumpStone Gaming" \
            latest.json \
            windows-build/*.exe \
            windows-build/*.zip
