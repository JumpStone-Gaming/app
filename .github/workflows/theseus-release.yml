name: JS Gaming App release
on:
  workflow_run:
    workflows: ['Modrinth App build'] # Muss exakt so heißen wie das 'name' Feld in deiner build.yml
    types: [completed]

jobs:
  release:
    name: Release JS Gaming App
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Check out code
        uses: actions/checkout@v4

      - name: 📥 Download Artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: theseus-build.yml # Name deiner Build-Datei
          workflow_conclusion: success
          run_id: ${{ github.event.workflow_run.id }}
          name: App bundle (x86_64-pc-windows-msvc) # Der Name des Uploads aus der build.yml
          path: windows-build

      - name: 🛠️ Generate updates.json
        run: |
          VERSION_TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION_TAG#v}"
          # Wir extrahieren die Signatur aus der generierten .sig Datei
          SIG=$(cat windows-build/release/bundle/nsis/JS Gaming App_${VERSION}_x64-setup.nsis.zip.sig)

          jq -nc \
            --arg ver "$VERSION" \
            --arg sig "$SIG" \
            --arg url "https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/JS_Gaming_App_${VERSION}_x64-setup.nsis.zip" \
            '{
              "version": $ver,
              "notes": "JumpStone Launcher Update",
              "pub_date": now | todateiso8601,
              "platforms": {
                "windows-x86_64": {
                  "signature": $sig,
                  "url": $url
                }
              }
            }' > latest.json

      - name: 🏷️ Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION_TAG#v}"

          gh release create "$VERSION_TAG" \
            --title "JS Gaming App ${VERSION}" \
            --notes "Automatischer Release von JumpStone Gaming" \
            latest.json \
            windows-build/release/bundle/nsis/*.exe \
            windows-build/release/bundle/nsis/*.zip
